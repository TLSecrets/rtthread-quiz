<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT-Thread 嵌入式操作系统 - 刷题系统</title>
<style>
/* ===== Theme Variables ===== */
:root {
  --bg: #f5f0eb; --bg-card: #fff; --bg-sidebar: #faf7f2;
  --text: #2c2416; --text-secondary: #6b5e4a; --text-muted: #9b8e7a;
  --border: #e0d5c1; --accent: #9b7400; --accent-light: #f0d78c;
  --accent-bg: #fef9e7; --accent-text: #fff;
  --success: #2d6a4f; --success-bg: #d8f3dc; --success-light: #b7e4c7;
  --error: #c1121f; --error-bg: #fce4e4; --error-light: #f8d0d0;
  --selected: #d4a017; --selected-bg: #fff3cd;
  --wrong-bg: #fef2f2; --wrong-border: #fca5a5;
  --shadow: 0 1px 8px rgba(0,0,0,0.05); --radius: 10px;
  --transition: 0.22s ease; --font: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono: 'Cascadia Code','Fira Code','Consolas',monospace;
  --line-height: 1.75;
}
[data-theme="dark"] {
  --bg: #1a1a2e; --bg-card: #16213e; --bg-sidebar: #0f3460;
  --text: #e0e0e0; --text-secondary: #a0a0a0; --text-muted: #708090;
  --border: #2a3a5c; --accent: #c9a227; --accent-light: #3a2f10;
  --accent-bg: #1f2a1a; --accent-text: #1a1a2e;
  --success: #52b788; --success-bg: #1a3a2a; --success-light: #2d5a3d;
  --error: #ff6b6b; --error-bg: #3a1a1a; --error-light: #5a2a2a;
  --selected: #d4a843; --selected-bg: #2a2a10;
  --wrong-bg: #2a1a1a; --wrong-border: #8b3a3a;
  --shadow: 0 1px 8px rgba(0,0,0,0.35);
}
/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;transition:background var(--transition),color var(--transition);
  line-height:var(--line-height);
}
/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:268px;min-width:268px;background:var(--bg-sidebar);
  border-right:1px solid var(--border);padding:16px 14px;
  overflow-y:auto;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:10px;
  transition:all var(--transition);z-index:10;
}
.main{flex:1;padding:24px 32px;max-width:880px;width:100%;margin:0 auto}
/* ===== Toast ===== */
.toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{
  padding:8px 18px;border-radius:8px;font-size:0.82rem;font-weight:600;
  background:var(--accent);color:var(--accent-text);box-shadow:0 4px 16px rgba(0,0,0,0.25);
  animation:toastIn 0.3s ease,toastOut 0.3s ease 1.5s forwards;
  pointer-events:auto;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
/* ===== Sidebar ===== */
.logo{font-size:1.1rem;font-weight:700;color:var(--accent);padding:4px 0 10px;border-bottom:2px solid var(--accent);letter-spacing:0.5px}
.side-section{margin-top:2px}
.side-label{
  font-size:0.68rem;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-secondary);margin-bottom:5px;font-weight:700;opacity:0.8;
}
/* Radio-button-style groups (replaces dropdowns) */
.radio-group{display:flex;flex-direction:column;gap:2px}
.radio-opt{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  border-radius:6px;cursor:pointer;font-size:0.75rem;color:var(--text);
  transition:all var(--transition);border:1px solid transparent;
  line-height:1.4;
}
.radio-opt:hover{background:var(--accent-light)}
.radio-opt input[type="radio"]{display:none}
.radio-opt .dot{
  width:14px;height:14px;border-radius:50%;border:2px solid var(--border);
  flex-shrink:0;transition:all var(--transition);position:relative;
}
.radio-opt input:checked+.dot{
  border-color:var(--accent);background:var(--accent);
}
.radio-opt input:checked+.dot::after{
  content:'';position:absolute;top:2px;left:2px;width:6px;height:6px;
  border-radius:50%;background:#fff;
}
.radio-opt.selected{background:var(--accent-light);font-weight:600;border-color:var(--accent)}
.radio-opt.disabled{opacity:0.4;pointer-events:none}
/* Buttons */
.btn-grp{display:flex;flex-wrap:wrap;gap:4px}
.btn{
  padding:5px 10px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--text);border-radius:6px;cursor:pointer;font-size:0.74rem;
  font-family:var(--font);transition:all var(--transition);white-space:nowrap;
}
.btn:hover{background:var(--accent-light);border-color:var(--accent)}
.btn.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600}
.btn.sm{padding:3px 7px;font-size:0.68rem}
.week-tags{display:flex;flex-direction:column;gap:3px}
.week-tag{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 9px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--text);border-radius:6px;cursor:pointer;font-size:0.74rem;
  transition:all var(--transition);line-height:1.3;
}
.week-tag:hover{background:var(--accent-light)}
.week-tag.active{background:var(--accent);color:var(--accent-text);font-weight:600}
.week-tag .cnt{font-size:0.68rem;opacity:0.7}
.separator{height:1px;background:var(--border);margin:2px 0;opacity:0.4}
.danger-btn{
  width:100%;background:var(--error-bg);color:var(--error);border-color:var(--error);
  font-weight:600;margin-top:4px;
}
.danger-btn:hover{background:var(--error-light)!important}
/* ===== Topbar ===== */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.topbar .title{font-size:1.2rem;font-weight:700}
.topbar .stats{font-size:0.78rem;color:var(--text-secondary)}
/* ===== Scope Filter ===== */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-bar .flabel{font-size:0.72rem;color:var(--text-secondary);font-weight:700}
/* ===== Question Card ===== */
.q-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;
  box-shadow:var(--shadow);transition:all var(--transition);position:relative;
}
.q-card.correct{border-left:4px solid var(--success)}
.q-card.wrong{border-left:4px solid var(--error);background:var(--wrong-bg)}
.q-card.favorited{border-top:3px solid var(--accent)}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.q-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.q-tag{
  font-size:0.68rem;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.5px;
}
.q-tag.week{background:var(--accent-light);color:var(--accent)}
.q-tag.type{background:var(--bg);color:var(--text-secondary)}
.q-tag.wrong-tag{background:var(--error-bg);color:var(--error)}
.q-tag.fav-tag{background:var(--accent-bg);color:var(--accent)}
.q-title{
  font-size:0.93rem;font-weight:500;margin-bottom:12px;
  line-height:1.85;color:var(--text);
}
.q-title mark{background:var(--selected-bg);color:var(--accent);padding:0 3px;border-radius:3px}
/* Options */
.options{display:flex;flex-direction:column;gap:7px}
.option{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:8px;cursor:pointer;
  transition:all var(--transition);font-size:0.86rem;position:relative;
  line-height:1.5;
}
.option:hover{border-color:var(--accent);background:var(--accent-bg)}
.option input[type="radio"]{display:none}
.option .opt-letter{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:0.78rem;flex-shrink:0;transition:all var(--transition);
}
.option.selected .opt-letter{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.option.correct-answer{border-color:var(--success);background:var(--success-bg)}
.option.correct-answer .opt-letter{background:var(--success);color:#fff;border-color:var(--success)}
.option.wrong-answer{border-color:var(--error);background:var(--error-bg)}
.option.wrong-answer .opt-letter{background:var(--error);color:#fff;border-color:var(--error)}
.option.disabled{pointer-events:none;opacity:0.88}
.option .orig-id{
  font-size:0.62rem;color:var(--text-muted);margin-left:auto;display:none;
  font-style:italic;
}
.option.show-orig .orig-id{display:inline}
/* Fill Blank */
.fill-blank-group{display:flex;flex-direction:column;gap:10px}
.fill-input{display:flex;align-items:center;gap:10px}
.fill-input input{
  flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;
  font-size:0.86rem;font-family:var(--font);background:var(--bg-card);
  color:var(--text);transition:all var(--transition);line-height:1.5;
}
.fill-input input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.fill-input input.correct-input{border-color:var(--success);background:var(--success-bg)}
.fill-input input.wrong-input{border-color:var(--error);background:var(--error-bg)}
.fill-input label{font-weight:700;font-size:0.76rem;min-width:32px}
/* Analysis */
.analysis{
  margin-top:10px;padding:10px 14px;background:var(--accent-bg);
  border-radius:8px;font-size:0.8rem;line-height:1.7;
  border:1px solid var(--accent-light);display:none;
}
.analysis.show{display:block}
.analysis .a-label{color:var(--accent);font-weight:700}
.analysis .a-content{color:var(--text)}
.analysis .tip{
  margin-top:6px;padding:6px 10px;background:var(--bg-card);
  border-radius:6px;color:var(--success);font-style:italic;
  border-left:3px solid var(--success);line-height:1.6;
}
.analysis .tip::before{content:'🧠 ';font-style:normal}
/* Actions */
.q-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.action-btn{
  background:none;border:1px solid var(--border);padding:3px 9px;
  border-radius:6px;cursor:pointer;font-size:0.72rem;color:var(--text-secondary);
  transition:all var(--transition);font-family:var(--font);
}
.action-btn:hover{background:var(--accent-light);color:var(--accent)}
.action-btn.fav-active{background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
/* ===== Submit ===== */
.submit-panel{text-align:center;padding:16px 0}
.submit-btn{
  padding:10px 32px;background:var(--accent);color:var(--accent-text);
  border:none;border-radius:8px;font-size:0.95rem;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:all var(--transition);
  box-shadow:var(--shadow);
}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
/* ===== Result ===== */
.result-panel{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;text-align:center;
  margin:16px 0;box-shadow:var(--shadow);
}
.result-panel .big-score{font-size:2.8rem;font-weight:900;color:var(--accent)}
.result-panel .detail{margin-top:6px;font-size:0.85rem;color:var(--text-secondary)}
/* ===== Pagination ===== */
.pagination{
  display:flex;justify-content:center;align-items:center;gap:12px;
  padding:12px 0;position:sticky;bottom:0;background:var(--bg);
  border-top:1px solid var(--border);margin-top:16px;z-index:5;
}
.pagination .page-btn{
  padding:8px 18px;border:1px solid var(--border);background:var(--bg-card);
  color:var(--text);border-radius:8px;cursor:pointer;font-size:0.82rem;
  font-family:var(--font);transition:all var(--transition);font-weight:600;
}
.pagination .page-btn:hover:not(:disabled){background:var(--accent);color:var(--accent-text);border-color:var(--accent)}
.pagination .page-btn:disabled{opacity:0.35;cursor:not-allowed}
.pagination .page-info{font-size:0.82rem;color:var(--text-secondary);font-weight:600;min-width:60px;text-align:center}
/* ===== Empty ===== */
.empty-state{text-align:center;padding:50px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:2.8rem;margin-bottom:8px}
/* ===== Mobile ===== */
.menu-toggle{display:none;position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:var(--accent-text);border:none;font-size:1.4rem;cursor:pointer;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,0.3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9}
/* ===== Confirm Dialog ===== */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center}
.confirm-box{
  background:var(--bg-card);border-radius:12px;padding:24px 28px;
  max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);
  text-align:center;
}
.confirm-box h3{margin-bottom:10px;color:var(--error)}
.confirm-box p{font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px;line-height:1.6}
.confirm-box .btn-row{display:flex;gap:8px;justify-content:center}
.confirm-box .btn-cancel{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.confirm-box .btn-confirm{background:var(--error);color:#fff;border:none}
/* Debug toggle */
.debug-switch{display:flex;align-items:center;gap:6px;font-size:0.68rem;color:var(--text-muted);cursor:pointer;margin-top:4px;padding:4px 6px;border-radius:4px;transition:all var(--transition)}
.debug-switch:hover{background:var(--accent-light)}
.debug-switch input{margin:0}
/* Slider & Presets */
.slider-wrap{display:flex;align-items:center;gap:8px;margin-top:2px}
.slider-wrap input[type=range]{flex:1;height:6px;border-radius:3px;background:var(--border);appearance:none;cursor:pointer}
.slider-wrap input[type=range]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,0.2)}
.slider-val{font-size:0.7rem;font-weight:700;color:var(--accent);min-width:40px;text-align:right}
.slider-presets{display:flex;gap:3px;margin-top:3px}
.preset-btn.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:600}
/* ===== Responsive ===== */
@media (max-width:768px){
  .app{flex-direction:column}
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:280px;z-index:99;transition:left var(--transition)}
  .sidebar.open{left:0}
  .sidebar-overlay.show{display:block}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .main{padding:14px 10px;max-width:100%}
  .topbar .title{font-size:1rem}
  .q-card{padding:14px 12px}
  .q-title{font-size:0.84rem}
  .option{padding:9px 10px;font-size:0.8rem}
  .pagination{padding:8px 0}
  .filter-bar{gap:4px}
}
</style>
</head>
<body>
<div class="app">
  <!-- ===== TOASTS ===== -->
  <div class="toast-container" id="toastContainer"></div>
  <!-- ===== CONFIRM DIALOG ===== -->
  <div id="confirmDialog" style="display:none"></div>
  <!-- ===== SIDEBAR OVERLAY ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">📘 RT-Thread 刷题</div>
    <!-- Layout -->
    <div class="side-section"><div class="side-label">📐 页面布局</div>
      <div class="radio-group" id="layoutGroup"></div></div>
    <!-- Answer Mode -->
    <div class="side-section"><div class="side-label">⚡ 答题模式</div>
      <div class="radio-group" id="answerModeGroup"></div></div>
    <!-- Auto Jump Delay (fast mode only) -->
    <div class="side-section" id="jumpDelaySection" style="display:none">
      <div class="side-label">⏱ 自动跳转间隔</div>
      <div class="slider-wrap">
        <input type="range" id="jumpDelaySlider" min="200" max="5000" step="100" value="800" oninput="setJumpDelay(this.value)">
        <span class="slider-val" id="jumpDelayLabel">800ms</span>
      </div>
      <div class="slider-presets">
        <button class="btn sm preset-btn" data-delay="300" onclick="setJumpDelay(300)">0.3s</button>
        <button class="btn sm preset-btn active" data-delay="800" onclick="setJumpDelay(800)">0.8s</button>
        <button class="btn sm preset-btn" data-delay="1500" onclick="setJumpDelay(1500)">1.5s</button>
        <button class="btn sm preset-btn" data-delay="3000" onclick="setJumpDelay(3000)">3s</button>
      </div>
    </div>
    <!-- Order -->
    <div class="side-section"><div class="side-label">🔀 排序模式</div>
      <div class="radio-group" id="orderGroup"></div></div>
    <!-- Option Shuffle -->
    <div class="side-section"><div class="side-label">🎲 选项打乱</div>
      <div class="radio-group" id="optShuffleGroup"></div></div>
    <!-- Favorite Range -->
    <div class="side-section"><div class="side-label">⭐ 收藏范围</div>
      <div class="radio-group" id="favRangeGroup"></div></div>
    <!-- Favorite Sort -->
    <div class="side-section"><div class="side-label">📋 收藏排序</div>
      <div class="radio-group" id="favSortGroup"></div></div>
    <!-- Analysis -->
    <div class="side-section"><div class="side-label">💡 解析时机</div>
      <div class="radio-group" id="analysisGroup"></div></div>
    <!-- Theme -->
    <div class="side-section"><div class="side-label">🎨 主题</div>
      <div class="btn-grp" id="themeGroup">
        <button class="btn" data-theme="light" onclick="setTheme('light')">☀ 亮色</button>
        <button class="btn active" data-theme="dark" onclick="setTheme('dark')">🌙 暗色</button>
      </div></div>
    <!-- Debug -->
    <div class="side-section">
      <label class="debug-switch" title="显示每个选项的原始ID，验证打乱后答案映射正确">
        <input type="checkbox" id="debugOrigId" onchange="toggleDebugOrigId(this.checked)"> 🔍 显示选项原始ID
      </label>
    </div>
    <!-- Weeks (only in weekly layout) -->
    <div class="side-section" id="weekSection" style="display:none">
      <div class="side-label">📅 周次选择</div>
      <div class="week-tags" id="weekTags"></div>
    </div>
    <div class="separator"></div>
    <!-- Type Filter -->
    <div class="side-section"><div class="side-label">📝 题型筛选</div>
      <div class="btn-grp" id="typeGroup">
        <button class="btn active" data-type="all" onclick="setTypeFilter('all')">全部</button>
        <button class="btn" data-type="single_choice" onclick="setTypeFilter('single_choice')">单选</button>
        <button class="btn" data-type="fill_blank" onclick="setTypeFilter('fill_blank')">填空</button>
      </div></div>
    <div class="separator"></div>
    <!-- Reset -->
    <button class="btn danger-btn" onclick="confirmReset()">🔄 重置全部进度</button>
  </aside>
  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="topbar">
      <div>
        <div class="title" id="pageTitle">全部题目</div>
        <div class="stats" id="pageStats">共 62 题 | 已完成 0</div>
      </div>
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="菜单">☰</button>
    </div>
    <!-- Scope Filter -->
    <div class="filter-bar" id="scopeFilter">
      <span class="flabel">筛选：</span>
      <div class="btn-grp" id="scopeGroup"></div>
    </div>
    <!-- Submit btn (submit mode only) -->
    <div class="submit-panel" id="submitPanel" style="display:none">
      <button class="submit-btn" onclick="submitAll()">📝 提交全部答案</button>
    </div>
    <!-- Result -->
    <div id="resultPanel"></div>
    <!-- Questions -->
    <div id="questionsContainer"></div>
    <!-- Pagination (instant & fast modes) -->
    <div class="pagination" id="pagination" style="display:none">
      <button class="page-btn" id="prevBtn" onclick="goPage(-1)" disabled>◀ 上一题</button>
      <span class="page-info" id="pageInfo">1 / 1</span>
      <button class="page-btn" id="nextBtn" onclick="goPage(1)">下一题 ▶</button>
    </div>
  </main>
</div>
<!-- ================================================================
     JavaScript Application
     ================================================================ -->
<script>
// ===== STATE =====
const S = {
  layout:'global', typeFilter:'all', answerMode:'instant',
  orderMode:'original', optShuffle:'off', favRange:'zone_only',
  favSort:'time_order', analysisMode:'instant', theme:'dark',
  activeWeek:null, scope:'all', submitted:false,
  currentPage:0, debugOrigId:false, autoJumpDelay:800
};
let _lastPoolKey='';
// ===== PERSISTENCE =====
let BANK=[], favorites=new Set(), favTimestamps={}, userAnswers={}, submittedAnswers={}, activeQuestions=[];
let weeklyMap={};
function save(){try{localStorage.setItem('rtq_v2',JSON.stringify({
  favorites:[...favorites],favTimestamps,userAnswers,submittedAnswers,
  ...S, submittedAnswers }))}catch(e){}}
function load(){try{let d=JSON.parse(localStorage.getItem('rtq_v2')||'{}');
  if(d.favorites)favorites=new Set(d.favorites);if(d.favTimestamps)favTimestamps=d.favTimestamps;
  if(d.userAnswers)userAnswers=d.userAnswers;if(d.submittedAnswers)submittedAnswers=d.submittedAnswers||{};
  ['layout','typeFilter','answerMode','orderMode','optShuffle','favRange','favSort','analysisMode','theme','activeWeek','scope','submitted','debugOrigId','autoJumpDelay'].forEach(k=>{if(d[k]!==undefined)S[k]=d[k]})}catch(e){}}
// ===== BANK =====
async function loadBank(){try{let r=await fetch('question_bank.json');if(r.ok)BANK=await r.json();else throw 0}catch(e){if(typeof INLINE_BANK!=='undefined')BANK=INLINE_BANK}buildWeekly();refresh()}
function buildWeekly(){weeklyMap={};BANK.forEach(q=>{if(!weeklyMap[q.week])weeklyMap[q.week]=[];weeklyMap[q.week].push(q)})}
// ===== FILTER =====
function filterPool(){
  let p=[...BANK];
  if(S.layout==='weekly'&&S.activeWeek!==null)p=p.filter(q=>q.week===S.activeWeek);
  if(S.typeFilter!=='all')p=p.filter(q=>q.type===S.typeFilter);
  let wrongIds=new Set();Object.entries(submittedAnswers).forEach(([id,r])=>{if(!r.correct)wrongIds.add(parseInt(id))});
  if(S.scope==='wrong')p=p.filter(q=>wrongIds.has(q.id));
  if(S.scope==='fav_only')p=p.filter(q=>favorites.has(q.id));
  return p;
}
// ===== ORDER =====
function applyOrder(pool){
  let favIds=new Set(favorites),wrongIds=new Set();
  Object.entries(submittedAnswers).forEach(([id,r])=>{if(!r.correct)wrongIds.add(parseInt(id))});
  let ordered;
  switch(S.orderMode){
    case 'global_shuffle':{let nf=pool.filter(q=>!favIds.has(q.id)),f=pool.filter(q=>favIds.has(q.id));ordered=[...shuffle(nf),...f];break}
    case 'pool_shuffle':ordered=shuffle([...pool]);break;
    case 'zone_diff':{let reg=pool.filter(q=>!favIds.has(q.id)&&!wrongIds.has(q.id)),wr=pool.filter(q=>wrongIds.has(q.id)),fp=pool.filter(q=>favIds.has(q.id));ordered=[...reg,...shuffle(wr),...shuffle(fp)];break}
    default:ordered=[...pool];ordered.sort((a,b)=>{if(a.type==='single_choice'&&b.type==='fill_blank')return -1;if(a.type==='fill_blank'&&b.type==='single_choice')return 1;return a.id-b.id});break;
  }
  if(S.scope==='fav_only')ordered=applyFavSort(ordered);
  return ordered;
}
function applyFavSort(pool){
  switch(S.favSort){case'random':return shuffle([...pool]);case'week_group_random':{let g={};pool.forEach(q=>{if(!g[q.week])g[q.week]=[];g[q.week].push(q)});let r=[];Object.keys(g).sort((a,b)=>a-b).forEach(w=>r=r.concat(shuffle(g[w])));return r}default:return[...pool].sort((a,b)=>(favTimestamps[a.id]||0)-(favTimestamps[b.id]||0))}
}
function shuffle(a){let arr=[...a];for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
// ===== OPT SHUFFLE =====
function getDisplayOpts(q){if(!q.options)return[];let sh=false;switch(S.optShuffle){case'off':sh=false;break;case'week_random':sh=(S.layout==='weekly'&&S.activeWeek!==null&&q.week===S.activeWeek);break;case'global_random':sh=true;break;case'fav_fixed':sh=!favorites.has(q.id);break}if(!sh)return q.options.map(o=>({...o}));return shuffle(q.options.map(o=>({...o})))}
// ===== RENDER =====
function refresh(){
  updateSidebar();updateMain();
}

  // Layout radios
  renderRadios('layoutGroup',[
    {v:'global',t:'全局刷题（所有题目同页滚动/翻页）'},
    {v:'weekly',t:'按周分页（独立周标签+收藏专区）'}
  ],S.layout,v=>{setLayout(v)});
  // Answer mode radios
  let amOpts=[
    {v:'instant',t:'逐题翻页（手动切题，即时判对错）'},
    {v:'submit',t:'整卷交卷（全部答完一键出分）'},
    {v:'fast',t:'快速刷题（答对自动切题，答错停留）'}

    {v:'pool_shuffle',t:'筛选池内随机'},
    {v:'zone_diff',t:'分区差异化（常规原序，错题/收藏随机）'}
  ],S.orderMode,v=>{setOrderMode(v)});
  // Option shuffle radios
  renderRadios('optShuffleGroup',[
    {v:'off',t:'关闭（ABCD 原始顺序）'},
    {v:'week_random',t:'周内随机（仅当前周选择题打乱）'},
    {v:'global_random',t:'全局随机（全部选择题打乱）'},
    {v:'fav_fixed',t:'收藏固定原始（普通随机，收藏原序）'}
  ],S.optShuffle,v=>{setOptShuffle(v)});
  // Fav range radios
  renderRadios('favRangeGroup',[
    {v:'zone_only',t:'仅收藏专区（常规页只显示标记）'},
    {v:'filterable',t:'可筛选刷题（可叠加周次题型筛选）'},
    {v:'mixed',t:'混合展示（收藏题带专属标识）'}
  ],S.favRange,v=>{setFavRange(v)});

  let favDisabled=S.scope!=='fav_only';
  renderRadios('favSortGroup',[
    {v:'time_order',t:'按收藏时间排序',d:favDisabled},
    {v:'random',t:'整体随机打乱',d:favDisabled},
    {v:'week_group_random',t:'按周分组组内随机',d:favDisabled}
  ],S.favSort,v=>{if(!favDisabled)setFavSort(v)});
  // Analysis radios
  renderRadios('analysisGroup',[
    {v:'instant',t:'即时展示（答题后自动展开解析）'},
    {v:'manual',t:'手动展开（点击按钮查看解析）'},
    {v:'off',t:'仅对错（不显示解析内容）'}
  ],S.analysisMode,v=>{setAnalysisMode(v)});
  // Theme
  document.querySelectorAll('#themeGroup .btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===S.theme));
  // Week section
  let ws=document.getElementById('weekSection');

  if(S.layout==='weekly'){
    let wt=document.getElementById('weekTags');wt.innerHTML='';
    let allTag=createEl('div',{class:'week-tag'+(S.activeWeek===null?' active':''),html:'<span>📚 全部周次</span><span class="cnt">'+BANK.length+'题</span>',on:{click:()=>{S.activeWeek=null;save();refresh()}}});
    wt.appendChild(allTag);
    Object.keys(weeklyMap).sort((a,b)=>a-b).forEach(w=>{
      let qs=weeklyMap[w],active=S.activeWeek===parseInt(w);
      let t=createEl('div',{class:'week-tag'+(active?' active':''),html:'<span>第'+w+'周 '+qs[0].topic+'</span><span class="cnt">'+qs.length+'题</span>',on:{click:()=>{S.activeWeek=parseInt(w);save();refresh()}}});
      wt.appendChild(t);
    });
  }
  // Type filter
  document.querySelectorAll('#typeGroup .btn').forEach(b=>b.classList.toggle('active',b.dataset.type===S.typeFilter));

  let jds=document.getElementById('jumpDelaySection');

    let l=document.getElementById('jumpDelayLabel');if(l)l.textContent=S.autoJumpDelay+'ms';

}
function renderRadios(groupId, opts, selectedVal, onChange){
  let g=document.getElementById(groupId);g.innerHTML='';
  opts.forEach(o=>{
    let checked=o.v===selectedVal;
    let label=createEl('label',{class:'radio-opt'+(checked?' selected':'')+(o.d?' disabled':'')});
    let inp=createEl('input',{type:'radio',name:groupId,value:o.v,checked:checked});
    if(o.d)inp.disabled=true;
    let dot=createEl('span',{class:'dot'});
    label.appendChild(inp);label.appendChild(dot);
    label.appendChild(document.createTextNode(o.t));
    label.addEventListener('click',(e)=>{
      if(o.d)return;if(S[getStateKey(groupId)]===o.v)return;
      onChange(o.v);save();refresh();toast('✅ 配置已生效');
    });
    g.appendChild(label);
  });
}
function getStateKey(gid){
  let m={'layoutGroup':'layout','answerModeGroup':'answerMode','orderGroup':'orderMode','optShuffleGroup':'optShuffle','favRangeGroup':'favRange','favSortGroup':'favSort','analysisGroup':'analysisMode'};
  return m[gid]||'';
}
function updateMain(){
  let pool=filterPool();let poolKey=JSON.stringify({len:pool.length,ids:pool.map(q=>q.id),mode:S.orderMode,scope:S.scope,favSort:S.favSort,opt:S.optShuffle});
  if(poolKey!==_lastPoolKey){activeQuestions=applyOrder(pool);_lastPoolKey=poolKey;S.currentPage=Math.min(S.currentPage,activeQuestions.length-1)}
  // Title
  let title='全部题目';if(S.layout==='weekly'&&S.activeWeek!==null){let wq=weeklyMap[S.activeWeek];title='第'+S.activeWeek+'周 · '+(wq?wq[0].topic:'')}
  if(S.scope==='wrong')title='❌ 错题回顾';if(S.scope==='fav_only')title='⭐ 收藏题目';
  document.getElementById('pageTitle').textContent=title;
  let ans=Object.keys(userAnswers).length;let done=Object.keys(submittedAnswers).length;
  document.getElementById('pageStats').textContent='共 '+activeQuestions.length+' 题 | 已作答 '+ans+' | 已判定 '+done;
  // Scope filter
  let sg=document.getElementById('scopeGroup');
  let scopeBtns=[
    {v:'all',t:'全部题目',always:true},
    {v:'wrong',t:'错题',always:true},
    {v:'fav_only',t:'仅收藏',show:S.favRange!=='zone_only'}
  ];
  sg.innerHTML='';
  scopeBtns.filter(b=>b.always||b.show).forEach(b=>{
    let btn=createEl('button',{class:'btn sm'+(S.scope===b.v?' active':''),text:b.t,on:{click:()=>{
      if(S.scope===b.v)return;if(b.v==='fav_only'&&S.favRange==='zone_only'){toast('⚠ 收藏范围设为"仅专区"，无法筛选收藏');return}
      S.scope=b.v;S.currentPage=0;save();refresh();toast('✅ 筛选已更新');
    }}});
    sg.appendChild(btn);
  });
  // Submit panel
  document.getElementById('submitPanel').style.display=(S.answerMode==='submit'&&!S.submitted)?'':'none';
  // Pagination
  let pag=document.getElementById('pagination');
  let isPaginated=S.answerMode==='instant'||S.answerMode==='fast';
  if(S.submitted&&S.answerMode==='submit')isPaginated=false;
  pag.style.display=isPaginated?'flex':'none';
  let total=activeQuestions.length;
  document.getElementById('pageInfo').textContent=total>0?(S.currentPage+1)+' / '+total:'0 / 0';
  document.getElementById('prevBtn').disabled=S.currentPage<=0||total===0;
  document.getElementById('nextBtn').disabled=S.currentPage>=total-1||total===0;
  // Render questions
  let container=document.getElementById('questionsContainer');container.innerHTML='';
  if(total===0){container.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>当前筛选条件下无题目</p></div>';return}
  if(isPaginated){container.appendChild(renderQ(activeQuestions[S.currentPage],S.currentPage))}
  else{activeQuestions.forEach((q,i)=>container.appendChild(renderQ(q,i)))}
  // Result
  if(S.submitted)renderResult();
}
function renderQ(q,idx){
  let card=createEl('div',{class:'q-card',id:'q-'+q.id});
  let ua=userAnswers[q.id],answered=ua!==undefined&&ua!==null;
  let sub=submittedAnswers[q.id],isCorrect=sub?.correct;
  if(answered&&isCorrect===true)card.classList.add('correct');
  if(answered&&isCorrect===false)card.classList.add('wrong');
  if(favorites.has(q.id))card.classList.add('favorited');
  // Header
  let metaHTML='<span class="q-tag week">第'+q.week+'周</span><span class="q-tag type">'+(q.type==='single_choice'?'单选':'填空')+'</span>';
  if(sub&&isCorrect===false)metaHTML+='<span class="q-tag wrong-tag">❌ 答错</span>';
  if(favorites.has(q.id))metaHTML+='<span class="q-tag fav-tag">⭐ 收藏</span>';
  let header=createEl('div',{class:'q-header',html:metaHTML+'<span style="font-size:0.68rem;color:var(--text-secondary)">#'+(idx+1)+'</span>'});
  // Title
  let tHTML=q.title;if(q.type==='fill_blank'){tHTML=tHTML.replace(/（[　\s]*）/g,'<mark>______</mark>');tHTML=tHTML.replace(/___/g,'<mark>______</mark>')}
  let titleEl=createEl('div',{class:'q-title',html:tHTML});
  // Body
  let bodyEl=createEl('div');
  if(q.type==='single_choice'){
    let dOpts=getDisplayOpts(q);let optsDiv=createEl('div',{class:'options'});
    dOpts.forEach(opt=>{
      let oc='option';if(answered&&ua===opt.id)oc+=' selected';
      if(S.submitted||(S.answerMode==='instant'&&answered)){oc+=' disabled';if(opt.id===q.correctAnswer)oc+=' correct-answer';if(answered&&ua===opt.id&&ua!==q.correctAnswer)oc+=' wrong-answer'}
      let oDiv=createEl('div',{class:oc+' '+(S.debugOrigId?'show-orig':'')});
      oDiv.dataset.qid=q.id;oDiv.dataset.opt=opt.id;
      let letter=createEl('span',{class:'opt-letter',text:opt.id});
      let txt=createEl('span',{text:opt.text});
      let orig=createEl('span',{class:'orig-id',text:'(原'+opt.id+')'});
      oDiv.appendChild(letter);oDiv.appendChild(txt);oDiv.appendChild(orig);
      if(!(S.submitted||(S.answerMode==='instant'&&answered))){oDiv.addEventListener('click',()=>selectOption(q.id,opt.id))}
      optsDiv.appendChild(oDiv);
    });
    bodyEl.appendChild(optsDiv);
  }else{
    let fbg=createEl('div',{class:'fill-blank-group'});
    let bc=q.blankCount||q.answers.length||1;
    for(let i=0;i<bc;i++){
      let fi=createEl('div',{class:'fill-input'});
      let lbl=createEl('label',{text:'空'+(i+1)});
      let val=(ua&&ua[i])||'';let ic='';
      if(S.submitted&&sub){let br=sub.blanks?.[i];if(br===true)ic='correct-input';else if(br===false)ic='wrong-input'}
      let inp=createEl('input',{type:'text',class:ic,value:val,placeholder:'输入答案...'});
      inp.dataset.qid=q.id;inp.dataset.blank=i;
      if(S.submitted||(S.answerMode==='instant'&&answered))inp.disabled=true;
      inp.addEventListener('input',function(){onFillInput(q.id,i,this.value)});
      fi.appendChild(lbl);fi.appendChild(inp);fbg.appendChild(fi);
    }
    bodyEl.appendChild(fbg);
  }
  // Analysis
  let showAna=S.analysisMode==='instant'||(S.analysisMode==='manual'&&q._showAnalysis)||(S.submitted&&S.analysisMode==='instant');
  if(S.analysisMode==='off')showAna=false;
  let anaDiv=createEl('div',{class:'analysis'+(showAna?' show':''),id:'analysis-'+q.id});
  if(q.analysis){anaDiv.innerHTML='<span class="a-label">📖 解析：</span><span class="a-content">'+q.analysis+'</span>'+(q.memoryTip?'<div class="tip">'+q.memoryTip+'</div>':'')}
  // Actions
  let actDiv=createEl('div',{class:'q-actions'});
  let isFav=favorites.has(q.id);
  let favBtn=createEl('button',{class:'action-btn'+(isFav?' fav-active':''),text:(isFav?'⭐ 已收藏':'☆ 收藏'),on:{click:()=>toggleFav(q.id)}});
  actDiv.appendChild(favBtn);
  if(S.analysisMode==='manual'){
    let anaBtn=createEl('button',{class:'action-btn',text:q._showAnalysis?'💡 隐藏解析':'💡 查看解析',on:{click:()=>toggleAnalysis(q.id)}});
    actDiv.appendChild(anaBtn);
  }
  card.appendChild(header);card.appendChild(titleEl);card.appendChild(bodyEl);card.appendChild(anaDiv);card.appendChild(actDiv);
  return card;
}
function createEl(tag,opts={}){
  let el=document.createElement(tag);if(opts.class)el.className=opts.class;if(opts.id)el.id=opts.id;
  if(opts.html)el.innerHTML=opts.html;if(opts.text)el.textContent=opts.text;
  if(opts.type)el.type=opts.type;if(opts.value!==undefined)el.value=opts.value;
  if(opts.checked)el.checked=true;if(opts.disabled)el.disabled=true;
  if(opts.placeholder)el.placeholder=opts.placeholder;
  if(opts.on)Object.entries(opts.on).forEach(([ev,fn])=>el.addEventListener(ev,fn));
  if(opts.dataset)Object.entries(opts.dataset).forEach(([k,v])=>el.dataset[k]=v);
  return el;
}
// ===== ANSWER =====
function selectOption(qid,optId){
  if(S.submitted)return;
  userAnswers[qid]=optId;save();
  let q=BANK.find(x=>x.id===qid),correct=q.correctAnswer===optId;
  if(S.answerMode==='instant'||S.answerMode==='fast'){
    submittedAnswers[qid]={correct};save();refresh();
    if(S.answerMode==='fast'&&correct){setTimeout(()=>{if(S.currentPage<activeQuestions.length-1){S.currentPage++;refresh()}},S.autoJumpDelay)}
  }else{refresh()}
}
function onFillInput(qid,blankIdx,value){
  if(!userAnswers[qid])userAnswers[qid]=[];userAnswers[qid][blankIdx]=value.trim();save();
  if((S.answerMode==='instant'||S.answerMode==='fast')&&!S.submitted){
    let q=BANK.find(x=>x.id===qid);
    let allFilled=q.answers.every((_,i)=>{let v=userAnswers[qid]&&userAnswers[qid][i];return v&&v.trim()!==''});
    if(allFilled)checkFill(qid);
  }
}
function checkFill(qid){
  let q=BANK.find(x=>x.id===qid);if(!q)return;
  let uv=userAnswers[qid]||[],brs=q.answers.map((ans,i)=>{let val=(uv[i]||'').trim().toLowerCase();return ans.accepted.some(a=>a.trim().toLowerCase()===val)});
  let allOk=brs.every(r=>r===true);submittedAnswers[qid]={correct:allOk,blanks:brs};save();refresh();
  if(S.answerMode==='fast'&&allOk){setTimeout(()=>{if(S.currentPage<activeQuestions.length-1){S.currentPage++;refresh()}},S.autoJumpDelay)}
}
function toggleAnalysis(qid){let q=BANK.find(x=>x.id===qid);if(!q)return;q._showAnalysis=!q._showAnalysis;refresh()}
function toggleFav(qid){
  if(favorites.has(qid)){favorites.delete(qid);delete favTimestamps[qid]}else{favorites.add(qid);favTimestamps[qid]=Date.now()}
  save();refresh();
}
// ===== SUBMIT =====
function submitAll(){
  let corr=0,total=activeQuestions.length;
  activeQuestions.forEach(q=>{
    let ua=userAnswers[q.id];if(ua===undefined||ua===null||(Array.isArray(ua)&&ua.every(v=>!v)))return;
    if(q.type==='single_choice'){let ok=q.correctAnswer===ua;submittedAnswers[q.id]={correct:ok};if(ok)corr++}
    else{let brs=q.answers.map((ans,i)=>{let val=((ua[i])||'').trim().toLowerCase();return ans.accepted.some(a=>a.trim().toLowerCase()===val)});let ok=brs.every(r=>r===true);submittedAnswers[q.id]={correct:ok,blanks:brs};if(ok)corr++}
  });
  S.submitted=true;save();renderResult(corr,total);refresh();
}
function renderResult(corr,total){
  if(corr===undefined){corr=0;activeQuestions.forEach(q=>{if(submittedAnswers[q.id]?.correct)corr++});total=activeQuestions.length}
  let pct=total>0?Math.round(corr/total*100):0,emo=pct>=90?'🎉':pct>=70?'👍':pct>=50?'💪':'📚';
  document.getElementById('resultPanel').innerHTML='<div class="result-panel"><div class="big-score">'+emo+' '+corr+'/'+total+'</div><div class="detail">正确率 '+pct+'% | 已判定 '+Object.keys(submittedAnswers).length+' 题<br>'+(pct>=60?'继续加油！':'多复习几遍会更好！')+'</div><button class="btn" onclick="retryAll()" style="margin-top:10px">🔄 重新作答</button></div>';
  document.getElementById('submitPanel').style.display='none';
}
function retryAll(){S.submitted=false;submittedAnswers={};userAnswers={};BANK.forEach(q=>{q._showAnalysis=false});save();document.getElementById('resultPanel').innerHTML='';refresh()}
// ===== PAGINATION =====
function goPage(dir){let np=S.currentPage+dir;if(np<0||np>=activeQuestions.length)return;S.currentPage=np;refresh()}
// ===== SETTINGS =====
function setLayout(v){S.layout=v;if(v==='global')S.activeWeek=null;S.currentPage=0;save();refresh();toast('✅ 布局已切换')}
function setTypeFilter(v){S.typeFilter=v;S.currentPage=0;save();refresh()}
function setAnswerMode(v){S.answerMode=v;S.submitted=false;submittedAnswers={};userAnswers={};BANK.forEach(q=>{q._showAnalysis=false});S.currentPage=0;save();refresh();toast('✅ 答题模式已切换')}
function setOrderMode(v){S.orderMode=v;S.currentPage=0;save();refresh();toast('✅ 排序模式已更新')}
function setOptShuffle(v){S.optShuffle=v;save();refresh();toast('✅ 选项打乱配置已更新')}
function setFavRange(v){
  S.favRange=v;
  if(v==='zone_only'&&S.scope==='fav_only'){S.scope='all';toast('⚠ 收藏范围改为"仅专区"，已自动切换到全部题目')}
  save();refresh();toast('✅ 收藏范围已更新')
}
function setFavSort(v){S.favSort=v;save();refresh();toast('✅ 收藏排序已更新')}
function setAnalysisMode(v){S.analysisMode=v;save();refresh();toast('✅ 解析时机已更新')}
function setTheme(v){S.theme=v;document.documentElement.setAttribute('data-theme',v);save();updateSidebar();refresh();toast(v==='dark'?'🌙 已切换暗色主题':'☀ 已切换亮色主题')}
function setScope(v){
  if(v==='fav_only'&&S.favRange==='zone_only'){toast('⚠ 收藏范围设为"仅专区"，无法在此筛选收藏');return}
  S.scope=v;S.currentPage=0;save();refresh();
}

// ===== JUMP DELAY =====
function setJumpDelay(val){
  let v=parseInt(val);S.autoJumpDelay=v;save();
  let slider=document.getElementById('jumpDelaySlider');
  if(slider)slider.value=v;
  let label=document.getElementById('jumpDelayLabel');
  if(label)label.textContent=v+'ms';
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.delay)===v));
  toast('⏱ 自动跳转间隔：'+v+'ms');
}
// ===== RESET =====
function confirmReset(){
  let overlay=createEl('div',{class:'confirm-overlay',id:'confirmOverlay'});
  let box=createEl('div',{class:'confirm-box',html:'<h3>⚠ 确认重置</h3><p>将清空全部答题记录、错题标记和收藏题目。<br>此操作不可恢复，确定继续？</p>'});
  let row=createEl('div',{class:'btn-row'});
  let cancel=createEl('button',{class:'btn btn-cancel',text:'取消',on:{click:()=>overlay.remove()}});
  let confirm=createEl('button',{class:'btn btn-confirm',text:'确定重置',on:{click:()=>{doReset();overlay.remove()}}});
  row.appendChild(cancel);row.appendChild(confirm);box.appendChild(row);overlay.appendChild(box);
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});
  document.body.appendChild(overlay);
}
function doReset(){
  S.submitted=false;submittedAnswers={};userAnswers={};favorites=new Set();favTimestamps={};
  BANK.forEach(q=>{q._showAnalysis=false});S.currentPage=0;
  save();document.getElementById('resultPanel').innerHTML='';refresh();toast('🔄 全部进度已重置')
}
// ===== TOAST =====
function toast(msg){
  let tc=document.getElementById('toastContainer');
  let t=createEl('div',{class:'toast',text:msg});
  tc.appendChild(t);setTimeout(()=>t.remove(),2000);
}

**—串行、逐字节传输(如串口)；**块设备**—批量、按块传输(如Flash、SD卡)。", "memoryTip": "同第13周第3题：字串行，块批量。"}, {"id": 10, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "实时系统根据对时间的敏感性可以将其分为两种实时系统：硬实时系统和（　　）系统。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["软实时"], "primary": "软实时"}], "analysis": "实时系统按对时间约束的严格程度分为**硬实时**和**软实时**。硬实时系统要求必须在规定时间内完成响应，超时即系统失效（如导弹控制）；软实时系统允许偶尔超时，但超时会导致系统性能下降（如视频播放）。", "memoryTip": "硬→硬性规定死线→错过即失败；软→弹性容忍→错过还能凑合用。谐音联想：硬=\"应\"(必须响应)，软=\"软和\"(可以软着陆)。"}, {"id": 11, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "嵌入式实时操作系统被设计成为一个（　　）系统，即在条件满足时，高优先级任务可以打断低优先级任务（　　）执行，从而极大地提高了系统（　　）。", "score": 0, "blankCount": 3, "answers": [{"accepted": ["抢占式", "抢占式/可抢占式"], "primary": "抢占式"}, {"accepted": ["优先", "优先/正在进行的"], "primary": "优先"}, {"accepted": ["实时性"], "primary": "实时性"}], "analysis": "嵌入式实时操作系统的核心特征是可抢占式调度，高优先级任务能打断低优先级任务优先执行，保证了对紧急事件的快速响应，提高了**实时性**。抢占式调度是RTOS区别于通用OS的关键特性。", "memoryTip": "三空链式记忆——**抢→优→实**（抢占优先权实现实时性）。联想：在食堂排队(低优先级)，领导来了(高优先级)直接插队(抢占)，优先打饭(优先执行)，快速吃上(实时性)。"}, {"id": 12, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "嵌入式系统程序开发有两种模式，（　　）程序开发模式和基于嵌入式操作系统的程序开发模式。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["裸机"], "primary": "裸机"}], "analysis": "嵌入式开发分为两种：**裸机开发**（Bare-Metal，无OS直接操作硬件）和**基于RTOS开发**。裸机模式适合简单、单一任务场景，RTOS适合多任务复杂场景。", "memoryTip": "裸机=光着身子干活→没有操作系统这个\"衣服\"→直接裸奔硬件。对应词：穿衣=穿OS。"}, {"id": 13, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "对于输入的信号、时间，实时系统必须能够在规定的时间内得到正确的响应；也可以说实时系统主要关注两点：即时间的（　　）和（　　）的正确性。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["正确性", "正确性/确定性"], "primary": "正确性"}, {"accepted": ["功能", "功能/及时性"], "primary": "功能"}], "analysis": "实时系统关注两个维度：①**时间的正确性**（在规定时间内完成响应，即及时性/确定性）；②**功能的正确性**（响应结果正确）。时间错误+结果正确=系统失效。两者缺一不可。", "memoryTip": "双正-时间正+功能正。\"时钟(时间正确性)\"和\"计算器(功能正确性)\"一起工作。记口诀：\"实时两正：时正功正\"。"}, {"id": 14, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "实时系统是一种需求倾向性的系统，或者是可以将实时系统看作是一个（　　）系统，即不同重要性的任务具有不同的（　　）：重要的任务能够被（　　）响应执行，非重要的任务可以适当往后延时。", "score": 0, "blankCount": 3, "answers": [{"accepted": ["等级", "等级/优先级驱动"], "primary": "等级"}, {"accepted": ["优先等级", "优先等级/优先级"], "primary": "优先等级"}, {"accepted": ["优先"], "primary": "优先"}], "analysis": "实时系统本质上是**优先级驱动**系统。不同任务有不同的**优先等级**，重要任务**优先**执行。这体现了实时系统的\"需求倾向性\"——不是公平轮转，而是按重要性倾斜资源。", "memoryTip": "等→优→先 三字诀。\"等你优先\"：等级制度→优先级→优先响应。联想：急诊室分诊(等级)→重症优先(优先级)→先抢救(优先)。"}, {"id": 15, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "运行在手机、平板、智慧屏等终端设备上的操作系统称为（　　）。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["移动操作系统"], "primary": "移动操作系统"}], "analysis": "运行在移动终端（手机、平板、智慧屏）上的操作系统称为**移动操作系统**。典型代表：Android、iOS、HarmonyOS。", "memoryTip": "手机上跑的系统=移动操作系统。直译记忆，不必刻意。"}, {"id": 16, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "计算机上的应用程序都必须在（　　）的支持下才能运行。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["操作系统"], "primary": "操作系统"}], "analysis": "操作系统是硬件与应用程序之间的中间层，管理硬件资源（CPU、内存、IO），为应用程序提供运行环境。没有OS，应用程序无法直接操作硬件。", "memoryTip": "操作系统=计算机的\"大管家\"。应用的\"衣食父母\"。"}, {"id": 17, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "操作系统是指管理和控制计算机硬件和（　　）资源的计算机程序。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["软件"], "primary": "软件"}], "analysis": "操作系统的定义：管理和控制计算机**硬件**和**软件**资源的系统程序。它是硬件与用户/应用之间的桥梁。", "memoryTip": "操作系统管两个：硬的(硬件)+软的(软件)。硬+软=OS。"}, {"id": 18, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "系统的实时性指的是在规定的时间内（　　）对外部事件做出响应。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["正确地"], "primary": "正确地"}], "analysis": "实时性=在规定时间内**正确地**响应。只快不准不行（结果错误），只准不快也不行（超时失效）。正确性+及时性缺一不可。", "memoryTip": "\"正确地\"三字概括。在限定时间内\"正确地\"做完。"}, {"id": 19, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "嵌入式系统是一种完全嵌入在装置或设备内部为满足特定需求而设计的（　　）。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["计算机系统"], "primary": "计算机系统"}], "analysis": "嵌入式系统本质上是**计算机系统**，但它是嵌入到设备内部、为特定功能定制的专用计算系统。与通用PC不同，它资源受限、功能专一。", "memoryTip": "嵌入式系统=藏在设备里的计算机系统。\"嵌入式+计算机系统\"天然配对。"}, {"id": 20, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "运行在嵌入式系统上的操作系统称为（　　）。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["嵌入式操作系统"], "primary": "嵌入式操作系统"}], "analysis": "运行在嵌入式系统上的操作系统叫**嵌入式操作系统**（Embedded OS）。常见的有FreeRTOS、RT-Thread、μC/OS等。", "memoryTip": "嵌入式系统+操作系统=嵌入式操作系统。层层嵌套命名。"}, {"id": 21, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "操作系统是直接运行在计算机上的最基本的（　　）。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["系统软件"], "primary": "系统软件"}], "analysis": "操作系统是最基本的**系统软件**，它直接运行在裸机之上，是所有其他软件运行的基础平台。", "memoryTip": "OS=System Software=系统软件。基础→系统软件→根基。"}, {"id": 22, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "操作系统指管理和控制计算机（　　）和（　　）资源的计算机程序。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["软件", "硬件"], "primary": "软件"}, {"accepted": ["硬件", "软件"], "primary": "硬件"}], "analysis": "与第8题类似，操作系统管理**硬件**和**软件**两大资源。两个空顺序可互换，参考答案支持两种组合。", "memoryTip": "同第8题：硬+软。"}, {"id": 23, "week": 2, "topic": "操作系统基础概念", "type": "fill_blank", "title": "RT-Thread是国内团队开发的具有完全知识产权的开源嵌入式（　　）操作系统，其基本属性之一是（　　）。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["实时多线程", "实时"], "primary": "实时多线程"}, {"accepted": ["支持多任务"], "primary": "支持多任务"}], "analysis": "RT-Thread全称Real Time-Thread，是**实时多线程**操作系统。开源性、实时性、支持多任务是它的核心属性。", "memoryTip": "RT=Real Time(实时)，Thread(线程)。RT-Thread实至名归——实时多线程。"}, {"id": 24, "week": 3, "topic": "线程", "type": "single_choice", "title": "系统对优先级不同的线程进行调度时，主要参考（ ）", "score": 0, "options": [{"id": "A", "text": "线程优先级"}, {"id": "B", "text": "线程栈"}, {"id": "C", "text": "时间片"}, {"id": "D", "text": "线程名"}], "correctAnswer": "A", "analysis": "线程优先级不同时，调度器依据**线程优先级**选择最高优先级的就绪线程运行。优先级是不同优先级线程调度的唯一依据。", "memoryTip": "优先级不同→比优先级。高者先跑。"}, {"id": 25, "week": 3, "topic": "线程", "type": "single_choice", "title": "关于RT-Thread线程的说法正确的是（ ）", "score": 0, "options": [{"id": "A", "text": "线程不是最基本的调度单位。"}, {"id": "B", "text": "线程调度算法是基于时间片轮转的调度算法。"}, {"id": "C", "text": "多个线程可以使用同一个线程栈。"}, {"id": "D", "text": "RT-Thread支持创建多个具有相同优先级的线程。"}], "correctAnswer": "D", "analysis": "线程是RT-Thread最基本的调度单位(A错)；RT-Thread调度算法是基于优先级的，同优先级才用时间片轮转(B错)；每个线程必须有自己的独立栈(C错)。D正确：RT-Thread允许多个线程拥有相同优先级。", "memoryTip": "排除法口诀：线是基(A错)→优先调度(B以偏概全)→独享栈(C错)→可同优(D对)。"}, {"id": 26, "week": 3, "topic": "线程", "type": "single_choice", "title": "RT-Thread最大支持线程优先级的个数为（ ）", "score": 0, "options": [{"id": "A", "text": "32"}, {"id": "B", "text": "64"}, {"id": "C", "text": "128"}, {"id": "D", "text": "256"}], "correctAnswer": "D", "analysis": "RT-Thread理论上最大支持**256**个优先级（0~255）。但默认配置通常为32个（STM32平台），可通过配置宏修改。这里问\"最大支持\"，选256。", "memoryTip": "最大=256，默认=32。记：RT-Thread使用8位(bit)存优先级→2^8=256。"}, {"id": 27, "week": 3, "topic": "线程", "type": "single_choice", "title": "系统对优先级不同的线程进行调度时，主要参考（ ）", "score": 0, "options": [{"id": "A", "text": "线程优先级"}, {"id": "B", "text": "线程栈"}, {"id": "C", "text": "时间片"}, {"id": "D", "text": "线程名"}], "correctAnswer": "A", "analysis": "同第1题，重复题目。不同优先级→参考优先级。", "memoryTip": "同第1题"}, {"id": 28, "week": 3, "topic": "线程", "type": "single_choice", "title": "RT-Thread最大支持线程优先级的个数为（ ）", "score": 0, "options": [{"id": "A", "text": "32"}, {"id": "B", "text": "64"}, {"id": "C", "text": "128"}, {"id": "D", "text": "256"}], "correctAnswer": "D", "analysis": "同第3题，重复题目。", "memoryTip": "同第3题"}, {"id": 29, "week": 3, "topic": "线程", "type": "single_choice", "title": "当RT-Thread启动时，会创建三个系统线程，下面那个不是启动时创建的三个线程（ ）。", "score": 0, "options": [{"id": "A", "text": "Main线程"}, {"id": "B", "text": "自定义线程"}, {"id": "C", "text": "定时器线程"}, {"id": "D", "text": "空闲线程"}], "correctAnswer": "B", "analysis": "RT-Thread启动时创建3个系统线程：**Main线程**(主线程)、**定时器线程**(timer)、**空闲线程**(idle)。**自定义线程**由用户创建，不属于系统启动线程。", "memoryTip": "三系统线程：主→定→闲（主线程、定时器线程、空闲线程）。自定义=用户的事。"}, {"id": 30, "week": 3, "topic": "线程", "type": "single_choice", "title": "RT-Thread系统对相同优先级的线程进行调度时，主要参考（ ）。", "score": 0, "options": [{"id": "A", "text": "线程优先级"}, {"id": "B", "text": "线程栈"}, {"id": "C", "text": "时间片"}, {"id": "D", "text": "线程名"}], "correctAnswer": "C", "analysis": "同优先级时，优先级机制失效，改用**时间片轮转**调度。每个线程轮流运行一个时间片。不同等优先→看优先级；同等优先→看时间片。", "memoryTip": "同优先→时间片轮转。联想：同样厉害的人，按时间轮流发言。"}, {"id": 31, "week": 3, "topic": "线程", "type": "single_choice", "title": "关于RT-Thread线程优先级的说法正确的是（ ）", "score": 0, "options": [{"id": "A", "text": "线程调度算法是基于时间片轮转的调度算法。"}, {"id": "B", "text": "数字越大优先级越高，0为最低优先级。"}, {"id": "C", "text": "RT-Thread不支持创建多个具有相同优先级的线程。"}, {"id": "D", "text": "RT-Thread的线程调度算法是基于优先级的调度算法。"}], "correctAnswer": "D", "analysis": "A错：基于优先级+时间片轮转(同优先级时)；B错：**数字越小优先级越高**(0最高)；C错：支持多个相同优先级；D对：核心调度算法是基于优先级的。", "memoryTip": "优先级方向：0=最高，越大越低。与其他RTOS(如μC/OS)一致。口诀：数字小→权力大。"}, {"id": 32, "week": 3, "topic": "线程", "type": "single_choice", "title": "对于STM32平台，RT-Thread 支持线程优先级的个数默认为（ ）", "score": 0, "options": [{"id": "A", "text": "8"}, {"id": "B", "text": "32"}, {"id": "C", "text": "64"}, {"id": "D", "text": "128"}], "correctAnswer": "B", "analysis": "STM32平台上RT-Thread**默认**支持**32**个优先级。这是出于RAM资源考虑。理论上最大256。", "memoryTip": "STM32→32个优先级(数字相同，巧合记忆)。ARM Cortex-M→32优先级位。"}, {"id": 33, "week": 3, "topic": "线程", "type": "single_choice", "title": "在RT-Thread系统中，下面那个定义表示线程对象（ ）", "score": 0, "options": [{"id": "A", "text": "struct rt_thread"}, {"id": "B", "text": "struct rt_serial_device"}, {"id": "C", "text": "struct rt_device"}, {"id": "D", "text": "struct rt_device_pin"}], "correctAnswer": "A", "analysis": "线程对象结构体是`struct rt_thread`。B是串口设备，C是通用设备，D是引脚设备。看名字识别：thread=线程。", "memoryTip": "struct rt_thread→thread=线程。关键词匹配。"}, {"id": 34, "week": 3, "topic": "线程", "type": "single_choice", "title": "以下那个函数是静态初始化线程的函数（ ）", "score": 0, "options": [{"id": "A", "text": "rt_thread_self()"}, {"id": "B", "text": "rt_thread_startup()"}, {"id": "C", "text": "rt_thread_create()"}, {"id": "D", "text": "rt_thread_init()"}], "correctAnswer": "D", "analysis": "静态初始化用`rt_thread_init()`，线程栈由用户预先分配。`rt_thread_create()`是动态创建(自动分配栈)。`rt_thread_startup()`是启动线程。`rt_thread_self()`获取当前线程。", "memoryTip": "init=初始化(静态)→自己准备栈；create=创建(动态)→系统分配栈。"}, {"id": 35, "week": 3, "topic": "线程", "type": "single_choice", "title": "以下那个函数是启动线程的函数（ ）", "score": 0, "options": [{"id": "A", "text": "rt_thread_self()"}, {"id": "B", "text": "rt_thread_startup()"}, {"id": "C", "text": "rt_thread_create()"}, {"id": "D", "text": "rt_thread_init()"}], "correctAnswer": "B", "analysis": "`rt_thread_startup()`将线程插入就绪队列启动运行。无论静态init还是动态create，都需要调用startup来启动。", "memoryTip": "startup=启动。创建/初始化→只是建好了，启动→才开始跑。"}, {"id": 36, "week": 3, "topic": "线程", "type": "single_choice", "title": "对于STM32平台，RT-Thread 支持线程优先级的个数默认为（ ）", "score": 0, "options": [{"id": "A", "text": "8"}, {"id": "B", "text": "32"}, {"id": "C", "text": "64"}, {"id": "D", "text": "128"}], "correctAnswer": "B", "analysis": "同第9题。", "memoryTip": "同第9题"}, {"id": 37, "week": 3, "topic": "线程", "type": "single_choice", "title": "以下那个函数是静态初始化线程的函数（ ）", "score": 0, "options": [{"id": "A", "text": "rt_thread_self()"}, {"id": "B", "text": "rt_thread_startup()"}, {"id": "C", "text": "rt_thread_create()"}, {"id": "D", "text": "rt_thread_init()"}], "correctAnswer": "D", "analysis": "同第11题。", "memoryTip": "同第11题"}, {"id": 38, "week": 3, "topic": "线程", "type": "single_choice", "title": "以下那个函数是启动线程的函数（ ）", "score": 0, "options": [{"id": "A", "text": "rt_thread_self()"}, {"id": "B", "text": "rt_thread_startup()"}, {"id": "C", "text": "rt_thread_create()"}, {"id": "D", "text": "rt_thread_init()"}], "correctAnswer": "B", "analysis": "同第12题。", "memoryTip": "同第12题"}, {"id": 39, "week": 3, "topic": "线程", "type": "single_choice", "title": "RT-Thread最低支持线程优先级的个数为（ ）", "score": 0, "options": [{"id": "A", "text": "8"}, {"id": "B", "text": "32"}, {"id": "C", "text": "64"}, {"id": "D", "text": "128"}], "correctAnswer": "A", "analysis": "RT-Thread**最低**支持**8**个优先级。用户可通过配置裁剪到8个来节省资源。", "memoryTip": "最低8→裁剪到最省。8/32/256（最低/默认/最大）。"}, {"id": 40, "week": 3, "topic": "线程", "type": "single_choice", "title": "以下那个函数是动态创建线程的函数（ ）", "score": 0, "options": [{"id": "A", "text": "rt_thread_self()"}, {"id": "B", "text": "rt_thread_startup()"}, {"id": "C", "text": "rt_thread_create()"}, {"id": "D", "text": "rt_thread_init()"}], "correctAnswer": "C", "analysis": "`rt_thread_create()`是动态创建线程，系统从堆中自动分配栈空间。与静态init的区别在于内存分配方式。", "memoryTip": "create=动态创建→系统帮你分配栈。API四件套：init(静态建)→startup(启动)→create(动态建)→self(获取自己)。"}, {"id": 41, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread系统中总共存在两类线程，分别是___、___。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["系统线程"], "primary": "系统线程"}, {"accepted": ["用户线程", "用户线程/应用线程"], "primary": "用户线程"}], "analysis": "RT-Thread线程分为两大类：**系统线程**(系统启动时自动创建，如idle、main、timer)和**用户线程**(用户应用创建的线程)。", "memoryTip": "系统线程(系)→用户线程(用)。系+用=全。系→system自带，用→user创建。"}, {"id": 42, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread中，___总是处于就绪状态。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["空闲线程"], "primary": "空闲线程"}], "analysis": "**空闲线程**(idle)是系统的最低优先级线程，在没有其他线程可运行时运行，**永远处于就绪态**，确保CPU总有事做。", "memoryTip": "空闲=最闲的线程→永远等着干活。CPU不能闲着→idle线程兜底。"}, {"id": 43, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread系统中总共存在两类线程，分别是___、___。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["系统线程"], "primary": "系统线程"}, {"accepted": ["用户线程", "用户线程/应用线程"], "primary": "用户线程"}], "analysis": "同第18题。", "memoryTip": "同第18题"}, {"id": 44, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread进行线程切换时上下文保存在___中。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["线程栈"], "primary": "线程栈"}], "analysis": "线程切换(PendSV异常)时，CPU寄存器(R4-R11等)被压入当前线程的**线程栈**中保存。恢复时从新线程的栈中弹出。每个线程拥有独立的栈空间。", "memoryTip": "栈→压栈保存→上下文=寄存器的家。切换=换栈。"}, {"id": 45, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread中，___是实现任务的载体，是最基本的调度单元，它描述了一个任务执行的运行环境，也描述了该任务所处的优先等级。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["线程"], "primary": "线程"}], "analysis": "在RT-Thread中，**线程**是最基本的调度单元。每个线程有自己的栈、优先级、入口函数等属性，描述了一个完整的任务执行环境。", "memoryTip": "实现任务的载体→线程。调度基本单元→线程。一切皆线程。"}, {"id": 46, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread中，最低优先级一般被赋予___。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["空闲线程"], "primary": "空闲线程"}], "analysis": "空闲线程(idle)拥有系统**最低优先级**，确保它只在没有其他线程需要运行时才获得CPU。", "memoryTip": "最低优先级→保证不抢活→只有没人干活时它才上。idle=背锅侠。"}, {"id": 47, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread进行线程切换时上下文保存在___中。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["线程栈"], "primary": "线程栈"}], "analysis": "同第21题。", "memoryTip": "同第21题"}, {"id": 48, "week": 3, "topic": "线程", "type": "fill_blank", "title": "RT-Thread中，___是实现任务的载体，是最基本的调度单元，它描述了一个任务执行的运行环境，也描述了该任务所处的优先等级。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["线程"], "primary": "线程"}], "analysis": "同第22题。", "memoryTip": "同第22题"}, {"id": 49, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "事件集也是线程间同步的机制之一，一个事件集可以包含多个事件。一个事件集可以包含的事件数最多为（　　）个。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["32"], "primary": "32"}], "analysis": "事件集用**32位**无符号整数表示，每位代表一个事件，因此最多**32**个事件。位0~位31。", "memoryTip": "32位=32事件。位图法：一位一事件。"}, {"id": 50, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "信号量的值表示可用资源量，其取值范围是：（　　）~65535。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["0"], "primary": "0"}], "analysis": "信号量是**非负整数**，最小值是**0**（无可用资源）。最大值65535(16位)。", "memoryTip": "0~65535=16位无符号整数的范围。0=没资源了。"}, {"id": 51, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "多个线程操作/访问同一块区域（代码），这块代码就称为（　　）。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["临界区"], "primary": "临界区"}], "analysis": "被多个线程共享访问的代码区域称为**临界区**(Critical Section)。临界区需要保护机制（互斥量/信号量）防止竞争条件。", "memoryTip": "临界=危险边缘→多个线程同时访问会出事→需要保护。临界→临界→需要互斥保护。"}, {"id": 52, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "使用语句static struct semaphore sem1声明的信号量sem1是（　　）信号量；使用语句static rt_sem sem2声明的信号量sem2是（　　）信号量。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["静态"], "primary": "静态"}, {"accepted": ["动态"], "primary": "动态"}], "analysis": "`struct semaphore`定义的是结构体变量（静态，编译时分配内存）；`rt_sem_t`是指针类型，通过`rt_sem_create()`动态创建。因此sem1=静态，sem2=动态信号量的句柄。", "memoryTip": "struct类型→值类型→静态；rt_sem_t→指针类型(句柄)→动态。值=静，针=动。"}, {"id": 53, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "RT-Thread的同步机制包括：信号量、（　　）、事件集三种。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["互斥量"], "primary": "互斥量"}], "analysis": "RT-Thread三大线程同步机制：**信号量**(Semaphore)、**互斥量**(Mutex)、**事件集**(Event)。", "memoryTip": "三兄弟：信→互→事。信号量计数、互斥量排他、事件集多信号。"}, {"id": 54, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "有th1和th2两个线程都去获取互斥量M，其中线程th2获得了M，则M的释放需要线程（　　）完成。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["th2"], "primary": "th2"}], "analysis": "互斥量遵循**谁获取谁释放**原则。th2获取了M，也只能由th2释放。这避免了优先级反转中的死锁问题（通过优先级继承解决）。", "memoryTip": "互斥量=谁拿谁放。借书人→还书人；拿锁人→放锁人。"}, {"id": 55, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "当成功获取了信号量后，其数值会（　　）；而成功获取互斥量后其数值会变为（　　）。", "score": 0, "blankCount": 2, "answers": [{"accepted": ["减1", "-1"], "primary": "减1"}, {"accepted": ["0", "零"], "primary": "0"}], "analysis": "获取(take)信号量：信号量计数值**减1**（P操作）。互斥量只有0/1两种状态，被获取后变为**0**（锁定状态）。信号量是多值计数器，互斥量是二值锁。", "memoryTip": "信号量减一(计数器)，互斥量归零(锁定)。信减互零。"}, {"id": 56, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "目前RT-Thread使用的同步机制有信号量、（　　）和事件集三种。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["互斥量"], "primary": "互斥量"}], "analysis": "同第5题。", "memoryTip": "同第5题"}, {"id": 57, "week": 6, "topic": "线程间同步", "type": "fill_blank", "title": "信号量是一种轻型的用于解决线程间同步问题的内核对象，线程可以获取或释放它，从而达到同步或互斥的目的。信号量的取值范围（　　）~65535。", "score": 0, "blankCount": 1, "answers": [{"accepted": ["0"], "primary": "0"}], "analysis": "同第2题。", "memoryTip": "同第2题"}, {"id": 58, "week": 6, "topic": "线程间同步", "type": "single_choice", "title": "下列关于互斥量正确的说法是（　）。", "score": 0, "options": [{"id": "A", "text": "互斥就是相互排斥，即一个互斥量只能被一个线程使用；"}, {"id": "B", "text": "互斥就是相互排斥，即一个互斥量只能有一个线程有权去获取；"}, {"id": "C", "text": "互斥就是相互排斥，即同一时刻只能被一个线程持有；"}, {"id": "D", "text": "以上对不对。"}], "correctAnswer": "C", "analysis": "互斥量的核心是**同一时刻只能被一个线程持有**(hold/own)。A的\"使用\"范围太宽(获取后释放前可以使用)，B的\"有权获取\"不准确(所有线程都有权尝试获取，但只有一个能成功)，C精确描述了互斥语义。", "memoryTip": "互斥=排斥同时持有。关键在\"同时\"+\"持有\"两个维度。"}, {"id": 59, "week": 6, "topic": "线程间同步", "type": "single_choice", "title": "关于临界区访问正确的说法是（　）。", "score": 0, "options": [{"id": "A", "text": "访问临界区前，必须先获取信号量；"}, {"id": "B", "text": "访问临界区前，必须先获取互斥量；"}, {"id": "C", "text": "访问临界区前，必须先获取事件集；"}, {"id": "D", "text": "以上说法对不对。"}], "correctAnswer": "D", "analysis": "临界区保护可以用多种机制（关中断、信号量、互斥量等），没有强制规定必须用哪一种。因此ABC都绝对化了，D正确。", "memoryTip": "临界区保护方式多样→没有唯一正确答案→选D。"}, {"id": 60, "week": 6, "topic": "线程间同步", "type": "single_choice", "title": "下面声明了动态信号量dynamic_sem的语句是（　）。", "score": 0, "options": [{"id": "A", "text": "struct rt_thread dynamic_sem;"}, {"id": "B", "text": "static struct rt_semaphore dynamic_sem;"}, {"id": "C", "text": "static rt_sem_t dynamic_sem;"}, {"id": "D", "text": "rt_mailbox_t dynamic_sem;"}], "correctAnswer": "C", "analysis": "`rt_sem_t`是信号量句柄类型（指针），用于指向动态创建的信号量。A是线程对象，B是静态信号量结构体，D是邮箱对象。", "memoryTip": "rt_sem_t→sem信号量→t代表type/指针→动态信号量句柄。"}, {"id": 61, "week": 6, "topic": "线程间同步", "type": "single_choice", "title": "下列关于信号量正确的表述是（　）。", "score": 0, "options": [{"id": "A", "text": "信号量是实现线程通信的一种机制。"}, {"id": "B", "text": "信号量表示一个二进制信号的取值。"}, {"id": "C", "text": "信号量可用于资源计数。"}, {"id": "D", "text": "没有信号量，线程就无法运行。"}], "correctAnswer": "C", "analysis": "信号量基于计数器，天然适合**资源计数**（如管理N个缓冲区）。A：信号量是同步机制，通信用邮箱/消息队列。B：互斥量才是二值(0/1)，信号量可以是多值。D：显然错误。", "memoryTip": "信号量=计数器→资源计数最合适。信=计数器，互=二值锁。"}, {"id": 62, "week": 6, "topic": "线程间同步", "type": "single_choice", "title": "关于事件集的正确说法是（　）。", "score": 0, "options": [{"id": "A", "text": "一个事件只能由一个线程处置；"}, {"id": "B", "text": "一个事件只能被一个线程使用一次；"}, {"id": "C", "text": "一个事件可被多个线程处置，也可以被多次利用；"}, {"id": "D", "text": "以上对不对。"}], "correctAnswer": "C", "analysis": "事件集的优势：一个事件可以被**多个线程**同时接收处理（一对多同步），且可以**重复使用**。与信号量不同，事件集发送后不会自动清除（除非设置为自动清除）。", "memoryTip": "事件集=群发消息→多线程可收→可复用。一对多广播。"}];
